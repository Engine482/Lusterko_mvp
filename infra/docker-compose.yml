services:
  postgres:
    image: postgres:17-alpine
    container_name: lusterko-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lusterko_dev}
      POSTGRES_USER: ${POSTGRES_USER:-lusterko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lusterko_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lusterko} -d ${POSTGRES_DB:-lusterko_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lusterko_postgres_data:

