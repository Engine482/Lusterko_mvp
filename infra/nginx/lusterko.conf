# Lusterko reverse-proxy vhost (lusterko.motornyi.com).
#
# This file is installed on the host (e.g. /etc/nginx/sites-available/lusterko.conf)
# and symlinked into /etc/nginx/sites-enabled/. Backend and frontend run in the
# `lusterko_prod` docker-compose network and bind only on 127.0.0.1 (see
# infra/docker-compose.prod.yml), so nginx is the single TLS-terminating ingress.

# HTTP → HTTPS redirect. The certbot ACME challenge under /.well-known/ stays
# on plain HTTP so renewals work.
server {
    listen 80;
    listen [::]:80;
    server_name lusterko.motornyi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lusterko.motornyi.com;

    ssl_certificate     /etc/letsencrypt/live/lusterko.motornyi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lusterko.motornyi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Conservative security headers — no HSTS preload until pilot stabilizes.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 2m;

    # Backend API. Trailing slash on proxy_pass is intentional: the upstream
    # FastAPI app already serves under /api/v1.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Next.js frontend.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
